apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: donation-service-slo-alerts
  namespace: solidarytech
  labels:
    # ESSENCIAL: este label faz o Prometheus do kube-prometheus-stack
    # (release "prometheus") reconhecer e carregar estas regras.
    release: prometheus
spec:
  groups:
    - name: donation-service.slo
      rules:
        # -------------------------------------------------------------
        # ALERTA 1 - Latência alta (viola o SLI de Latência: p99 < 500ms)
        # Fonte: histograma do prober do kubelet, que mede a duração real
        # do health check HTTP (/health) do donation-service.
        # -------------------------------------------------------------
        - alert: DonationServiceHighLatencyP99
          expr: |
            histogram_quantile(0.99,
              sum(rate(prober_probe_duration_seconds_bucket{namespace="solidarytech",pod=~"donation-service.*",probe_type="Liveness"}[5m])) by (le)
            ) * 1000 > 500
          for: 2m
          labels:
            severity: warning
            service: donation-service
            slo: latencia
          annotations:
            summary: "Latência p99 do donation-service acima de 500ms"
            description: "A latência p99 do health check está em {{ $value | humanize }}ms nos últimos 5 minutos, violando o SLO de latência (p99 < 500ms)."

        # -------------------------------------------------------------
        # ALERTA 2 - Disponibilidade abaixo do SLO de 99,9%
        # Fonte: kube-state-metrics (réplicas saudáveis vs. desejadas).
        # -------------------------------------------------------------
        - alert: DonationServiceLowAvailability
          expr: |
            (
              sum(kube_deployment_status_replicas_available{namespace="solidarytech",deployment="donation-service"})
              /
              clamp_min(sum(kube_deployment_spec_replicas{namespace="solidarytech",deployment="donation-service"}), 1)
            ) * 100 < 99.9
          for: 2m
          labels:
            severity: critical
            service: donation-service
            slo: disponibilidade
          annotations:
            summary: "Disponibilidade do donation-service abaixo do SLO de 99,9%"
            description: "A disponibilidade está em {{ $value | humanize }}% há mais de 2 minutos, consumindo o Error Budget do SLO de 99,9%."

        # -------------------------------------------------------------
        # ALERTA 3 - Health Check: serviço sem réplicas disponíveis
        # Hot Path totalmente indisponível.
        # -------------------------------------------------------------
        - alert: DonationServiceDown
          expr: |
            sum(kube_deployment_status_replicas_available{namespace="solidarytech",deployment="donation-service"}) < 1
          for: 1m
          labels:
            severity: critical
            service: donation-service
            slo: disponibilidade
          annotations:
            summary: "donation-service sem réplicas disponíveis"
            description: "O donation-service está sem nenhuma réplica saudável há mais de 1 minuto. Hot Path indisponível — impacto direto no processamento de doações."