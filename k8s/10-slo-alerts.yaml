apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: donation-service-slo-alerts
  namespace: solidarytech
  labels:
    # ESSENCIAL: este label faz o Prometheus do kube-prometheus-stack
    # (release "prometheus") reconhecer e carregar estas regras.
    release: prometheus
spec:
  groups:
    - name: donation-service.slo
      rules:
        # -------------------------------------------------------------
        # ALERTA 1 - Latência alta (viola o SLI de Latência: p99 < 500ms)
        # -------------------------------------------------------------
        - alert: DonationServiceHighLatencyP99
          expr: |
            histogram_quantile(0.99,
              sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{service="donation-service"}[5m])) by (le)
            ) * 1000 > 500
          for: 2m
          labels:
            severity: warning
            service: donation-service
            slo: latencia
          annotations:
            summary: "Latência p99 do donation-service acima de 500ms"
            description: "A latência p99 está em {{ $value | humanize }}ms nos últimos 5 minutos, violando o SLO de latência (p99 < 500ms)."

        # -------------------------------------------------------------
        # ALERTA 2 - Taxa de erro alta (viola o SLI de Erros / SLO 99.9%)
        # -------------------------------------------------------------
        - alert: DonationServiceHighErrorRate
          expr: |
            sum(rate(nginx_ingress_controller_requests{service="donation-service",status=~"5.."}[5m]))
            / clamp_min(sum(rate(nginx_ingress_controller_requests{service="donation-service"}[5m])), 0.001)
            * 100 > 1
          for: 2m
          labels:
            severity: critical
            service: donation-service
            slo: disponibilidade
          annotations:
            summary: "Taxa de erro 5xx do donation-service acima de 1%"
            description: "A taxa de erros 5xx está em {{ $value | humanize }}% nos últimos 5 minutos, consumindo o Error Budget do SLO de 99.9%."

        # -------------------------------------------------------------
        # ALERTA 3 - Health Check: serviço sem réplicas disponíveis (fora do ar)
        # -------------------------------------------------------------
        - alert: DonationServiceDown
          expr: |
            kube_deployment_status_replicas_available{deployment="donation-service",namespace="solidarytech"} < 1
          for: 1m
          labels:
            severity: critical
            service: donation-service
            slo: disponibilidade
          annotations:
            summary: "donation-service sem réplicas disponíveis"
            description: "O donation-service está sem nenhuma réplica saudável há mais de 1 minuto. Hot Path indisponível — impacto direto no processamento de doações."
