apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solidarytech-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/julianopoklen/HACKATHON-FASE-05-GITOPS.git'
    path: k8s
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: solidarytech
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
